databaseChangeLog:
  - changeSet:
      id: 1776336791300-1-add-currency-field
      author: Ughur
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            columns:
              - column:
                  name: currency
                  type: VARCHAR(255)
            tableName: accounts
  - changeSet:
      id: 1776336791300-2-currency-not-null
      author: Ughur
