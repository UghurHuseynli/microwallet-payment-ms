server:
  port: 8081

spring:
  application:
    name: payment-ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${PSQLDB_URL}
    username: ${PSQLDB_NAME}
    password: ${PSQLDB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

kafka:
  topics:
    payment-result: payment-result-topic
    convert-result: convert-result-topic
    document-result: document-result-topic
  groups:


springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /vs/api-docs

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}

logging:
  level:
    liquibase: info

currency:
  rates:
    USD_EUR: 0.92
    USD_AZN: 1.70
    EUR_USD: 1.09
    EUR_AZN: 1.85
    AZN_USD: 0.59
    AZN_EUR: 0.54
    AZN_TRY: 26.31
    TRY_AZN: 0.038

payment:
  fee:
    percentage: 1.5
