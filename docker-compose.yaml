services:

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-kraft
    restart: unless-stopped
    ports:
      - "9092:9092"   # host access
      - "29092:29092" # inter-broker / internal Docker
    environment:
      # ── KRaft identity ──────────────────────────────────────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller          # single node acts as both
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093    # nodeId@host:controllerPort

      # ── Listeners ───────────────────────────────────────────────
      # PLAINTEXT_HOST → localhost:9092  (Spring Boot on host machine)
      # PLAINTEXT      → kafka:29092     (other Docker containers)
      # CONTROLLER     → kafka:9093      (KRaft internal, never exposed)
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # ── Topic defaults ───────────────────────────────────────────
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # ── Log retention ────────────────────────────────────────────
      KAFKA_LOG_RETENTION_HOURS: 168          # 7 days
      KAFKA_LOG_RETENTION_BYTES: 1073741824   # 1 GB per partition
      KAFKA_LOG_SEGMENT_BYTES: 104857600      # 100 MB per segment

      # ── Performance / tuning ─────────────────────────────────────
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000

      # ── KRaft cluster ID (must be base64 UUID, fixed value) ──────
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    volumes:
      - kafka-kraft-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kraft-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

volumes:
  kafka-kraft-data: